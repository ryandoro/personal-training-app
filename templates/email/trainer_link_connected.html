<!DOCTYPE html>
<html lang="en" style="margin:0; padding:0;">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Client Connected</title>
  </head>
  <body style="margin:0; padding:0; background:#F5F7FB; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,'Helvetica Neue',sans-serif; color:#111827; line-height:1.6;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F5F7FB;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; background:#ffffff; border-radius:16px; box-shadow:0 6px 24px rgba(17,24,39,0.08); overflow:hidden;">
            <tr>
              <td style="padding:28px 24px 8px 24px;">
                <h1 style="margin:0 0 8px 0; font-size:22px; font-weight:700; color:#111827;">You're connected!</h1>
                <p style="margin:0; font-size:16px; color:#374151;">
                  {{ client_display_name }} just approved your trainer invite on <strong>FitBaseAI</strong>.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 24px 0 24px; font-size:15px; color:#4B5563;">
                Head to your trainer dashboard to start programming workouts, tracking progress, and managing sessions together.
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:22px 24px 32px 24px;">
                <a href="{{ url_for('trainer_dashboard', _external=True) }}" style="display:inline-block; background:#1EA4E6; color:#ffffff; text-decoration:none; font-weight:600; font-size:16px; padding:14px 22px; border-radius:10px;">
                  Open Trainer Dashboard
                </a>
              </td>
            </tr>
          </table>
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;">
            <tr>
              <td align="center" style="padding:16px; color:#9CA3AF; font-size:12px;">
                © {{ current_year }} FitBaseAI • fitbaseai.com
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
